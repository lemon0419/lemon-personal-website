<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐱 喵露谷 · 数独</title>
    <!-- 使用圆润可爱手写体 ZCOOL KuaiLe + Patrick Hand -->
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Patrick+Hand&display=swap" rel="stylesheet">
    <style>
        /* ===== 所有样式保持不变 ===== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: #f5e6d8;
            background-image: radial-gradient(ellipse at 30% 20%, #fce8dc, #f0d5c8);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Patrick Hand', 'Segoe UI', cursive;
            padding: 8px;
            margin: 0;
            touch-action: manipulation;
        }

        .game-container {
            max-width: 480px;
            width: 100%;
            background: #fff8f0;
            background-image: radial-gradient(circle at 20% 30%, #fffaf2, #f5e8dc);
            padding: 18px 14px 22px;
            border-radius: 24px;
            box-shadow:
                0 12px 40px rgba(180, 140, 120, 0.12),
                0 0 0 4px #f0d5c8,
                0 0 0 8px #fce8dc,
                0 0 0 12px #e8c8b8;
            border: 3px solid #f0d5c8;
            position: relative;
            min-height: 500px;
        }

        .deco-paw {
            position: absolute;
            font-size: 18px;
            opacity: 0.15;
            color: #d4a898;
        }
        .deco-paw.tl { top: 8px; left: 12px; }
        .deco-paw.tr { top: 8px; right: 12px; }
        .deco-paw.bl { bottom: 8px; left: 12px; }
        .deco-paw.br { bottom: 8px; right: 12px; }

        .page {
            display: none;
            animation: fadeIn 0.35s ease;
        }
        .page.active { display: block; }
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(6px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* ================================
                   菜单页 - 圆润可爱手写体（ZCOOL KuaiLe）
                ================================ */
        .menu-header {
            text-align: center;
            padding: 12px 0 16px;
        }
        .menu-header .title-icon {
            font-size: 72px;
            display: block;
            margin-bottom: 4px;
            filter: drop-shadow(0 4px 12px rgba(180, 140, 120, 0.15));
            animation: cat-bounce 3s ease-in-out infinite;
            line-height: 1.2;
        }
        .menu-header .title-icon img {
            width: 72px;
            height: 72px;
            object-fit: contain;
            display: inline-block;
            image-rendering: pixelated;
            filter: drop-shadow(0 4px 12px rgba(180, 140, 120, 0.15));
            border-radius: 50%;
            background: #fff8f0;
        }
        @keyframes cat-bounce {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-6px) rotate(2deg); }
        }

        .menu-header .title-main {
            font-size: 42px;
            font-weight: 400;
            font-family: 'ZCOOL KuaiLe', 'Patrick Hand', cursive;
            color: #c47a6a;
            text-shadow:
                0 3px 0 #fce8dc,
                0 6px 20px rgba(200, 140, 120, 0.12),
                0 0 40px rgba(200, 160, 140, 0.05);
            letter-spacing: 4px;
            line-height: 1.3;
            position: relative;
            display: inline-block;
            padding: 0 16px;
        }
        .menu-header .title-main::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 10%;
            width: 80%;
            height: 4px;
            background: linear-gradient(90deg, transparent, #f0d5c8, #e8c0b0, #f0d5c8, transparent);
            border-radius: 4px;
            opacity: 0.5;
        }

        .menu-header .title-sub {
            font-size: 18px;
            font-family: 'ZCOOL KuaiLe', 'Patrick Hand', cursive;
            color: #dbb0a0;
            letter-spacing: 6px;
            font-weight: 400;
            margin-top: 10px;
            display: inline-block;
            background: rgba(255, 248, 240, 0.5);
            padding: 4px 20px;
            border-radius: 30px;
            border: 1px solid rgba(200, 160, 140, 0.15);
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 10px 12px;
            margin: 4px 0;
        }

        .menu-btn {
            background: linear-gradient(165deg, #f5e0d0, #e8c8b8);
            border: none;
            border-radius: 24px;
            padding: 18px 48px;
            font-family: 'ZCOOL KuaiLe', 'Patrick Hand', cursive;
            font-size: 30px;
            font-weight: 400;
            color: #9a6a5a;
            box-shadow:
                0 6px 0 #dbb0a0,
                0 8px 24px rgba(200, 160, 140, 0.12);
            transition: all 0.08s ease;
            cursor: pointer;
            text-align: center;
            touch-action: manipulation;
            letter-spacing: 4px;
            border: 2px solid #e0c0b0;
            min-width: 200px;
            position: relative;
        }
        .menu-btn::before {
            content: '✨';
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            opacity: 0.4;
        }
        .menu-btn::after {
            content: '✨';
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            opacity: 0.4;
        }
        .menu-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #dbb0a0, 0 4px 12px rgba(200, 160, 140, 0.08);
        }

        .menu-deco {
            text-align: center;
            padding: 8px 0 4px;
            font-size: 22px;
            letter-spacing: 16px;
            color: #e0c8b8;
            opacity: 0.3;
            font-family: 'ZCOOL KuaiLe', cursive;
        }

        .bottom-banner {
            text-align: center;
            padding: 8px 0 4px;
            margin-top: 8px;
            font-size: 14px;
            color: #d4a898;
            letter-spacing: 4px;
            border-top: 2px solid rgba(200, 160, 140, 0.10);
            font-weight: 400;
            font-family: 'ZCOOL KuaiLe', 'Patrick Hand', cursive;
        }
        .bottom-banner .small {
            font-size: 12px;
            color: #e0c0b0;
            letter-spacing: 5px;
        }

        /* ================================
                   关卡地图 & 游戏界面（保持不变）
                ================================ */
        .map-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 14px;
            margin-bottom: 10px;
            background: #fcf3ea;
            border-radius: 16px;
            border: 2px solid #f0d5c8;
            box-shadow: 0 4px 8px rgba(180, 140, 120, 0.04);
        }
        .map-header .title {
            font-size: 17px;
            color: #c47a6a;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 700;
            font-family: 'ZCOOL KuaiLe', 'Patrick Hand', cursive;
        }
        .map-header .stats {
            font-size: 13px;
            color: #d4a898;
            background: #fff8f0;
            padding: 2px 14px;
            border-radius: 30px;
            border: 1px solid #f0d5c8;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Patrick Hand', cursive;
        }

        .map-grid-wrapper {
            background: #fcf3ea;
            padding: 8px;
            border-radius: 16px;
            box-shadow: inset 0 2px 12px rgba(180, 140, 120, 0.04), 0 4px 12px rgba(180, 140, 120, 0.04);
            margin-bottom: 10px;
            border: 2px solid #f0d5c8;
            max-height: 55vh;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }
        .map-grid-wrapper::-webkit-scrollbar {
            width: 4px;
        }
        .map-grid-wrapper::-webkit-scrollbar-track {
            background: #fcf3ea;
            border-radius: 8px;
        }
        .map-grid-wrapper::-webkit-scrollbar-thumb {
            background: #e8c8b8;
            border-radius: 8px;
        }

        .map-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 4px;
            padding: 4px;
            background: #fff8f0;
            border-radius: 12px;
            border: 1px solid #f0d5c8;
        }

        .map-cell {
            aspect-ratio: 1 / 1;
            background: #fcf3ea;
            border: 2px solid #f0d5c8;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 600;
            color: #d4a898;
            cursor: pointer;
            transition: all 0.12s ease;
            touch-action: manipulation;
            min-height: 34px;
            padding: 2px;
            font-family: 'Patrick Hand', cursive;
        }
        .map-cell:active {
            transform: scale(0.92);
        }
        .map-cell .level-num {
            font-size: 8px;
            font-weight: 700;
            line-height: 1.2;
            color: #d4a898;
        }
        .map-cell .level-icon {
            font-size: 18px;
            line-height: 1.2;
        }

        .map-cell.locked {
            background: #f5ece4;
            opacity: 0.5;
            cursor: not-allowed;
        }
        .map-cell.locked .level-icon {
            filter: grayscale(1);
        }
        .map-cell.completed {
            background: #f0e8dc;
            border-color: #d4c0b0;
        }
        .map-cell.completed .level-num {
            color: #b08a7a;
        }
        .map-cell.current {
            background: #fce8dc;
            border-color: #d49a8a;
            box-shadow: 0 0 0 3px #d49a8a, 0 0 16px rgba(200, 140, 120, 0.10);
            transform: scale(1.04);
            z-index: 2;
        }
        .map-cell.current .level-num {
            color: #b07a6a;
        }
        .map-cell.in-progress {
            background: #f5ece4;
            border-color: #e0c8b8;
        }

        /* ===== 祝尼魔 ===== */
        .player-container {
            position: absolute;
            pointer-events: none;
            z-index: 10;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            width: 48px;
            height: 52px;
        }
        .player-container.hidden {
            display: none;
        }

        .junimo {
            width: 100%;
            height: 100%;
            position: relative;
            transform-origin: bottom center;
            animation: junimo-float 2.5s ease-in-out infinite;
        }
        @keyframes junimo-float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-4px) rotate(1deg); }
        }

        .junimo-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            image-rendering: pixelated;
            filter: drop-shadow(0 4px 12px rgba(180, 140, 120, 0.15));
        }

        .junimo-shadow {
            position: absolute;
            bottom: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 26px;
            height: 5px;
            background: rgba(180, 140, 120, 0.12);
            border-radius: 50%;
            animation: shadow-pulse 2.5s ease-in-out infinite;
        }
        @keyframes shadow-pulse {
            0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.12; }
            50% { transform: translateX(-50%) scale(0.8); opacity: 0.06; }
        }

        .junimo-bubble {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 248, 240, 0.92);
            backdrop-filter: blur(4px);
            border-radius: 12px;
            padding: 2px 12px;
            font-size: 10px;
            color: #b07a6a;
            white-space: nowrap;
            border: 2px solid #f0d5c8;
            box-shadow: 0 4px 12px rgba(180, 140, 120, 0.05);
            opacity: 0;
            transition: opacity 0.3s ease;
            font-family: 'Patrick Hand', cursive;
            font-weight: 600;
            pointer-events: none;
        }
        .junimo-bubble::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-top: 6px solid rgba(255, 248, 240, 0.92);
        }
        .junimo-bubble.show {
            opacity: 1;
        }

        .junimo.jump {
            animation: junimo-jump 0.6s ease !important;
        }
        @keyframes junimo-jump {
            0% { transform: translateY(0) scale(1, 1); }
            30% { transform: translateY(-22px) scale(1, 0.85); }
            60% { transform: translateY(-4px) scale(1, 1.08); }
            100% { transform: translateY(0) scale(1, 1); }
        }
        .junimo.celebrate {
            animation: junimo-celebrate 0.7s ease 3 !important;
        }
        @keyframes junimo-celebrate {
            0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
            25% { transform: translateY(-16px) rotate(-10deg) scale(1.05); }
            75% { transform: translateY(-16px) rotate(10deg) scale(1.05); }
        }

        /* ===== 游戏界面 ===== */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fcf3ea;
            padding: 4px 14px;
            border-radius: 14px;
            border: 2px solid #f0d5c8;
            box-shadow: 0 4px 8px rgba(180, 140, 120, 0.04);
            margin-bottom: 10px;
            font-family: 'Patrick Hand', cursive;
            font-size: 14px;
            color: #b07a6a;
        }
        .top-bar .stat {
            display: flex;
            align-items: center;
            gap: 4px;
            background: #fff8f0;
            padding: 0 12px 0 6px;
            border-radius: 30px;
            border: 1px solid #f0d5c8;
            color: #d4a898;
            font-size: 12px;
            height: 26px;
        }
        .top-bar .stat .icon {
            font-size: 12px;
        }

        .level-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            padding: 0 4px;
            font-family: 'Patrick Hand', cursive;
            font-size: 15px;
            color: #b07a6a;
        }
        .level-row .level-badge {
            background: #fcf3ea;
            color: #c47a6a;
            padding: 0 16px;
            border-radius: 30px;
            border: 2px solid #f0d5c8;
            font-size: 14px;
            height: 28px;
            display: flex;
            align-items: center;
        }
        .level-row .difficulty-tag {
            background: #fff8f0;
            color: #d4a898;
            padding: 0 12px;
            border-radius: 30px;
            border: 1px solid #f0d5c8;
            font-size: 12px;
            height: 24px;
            display: flex;
            align-items: center;
        }

        .board-wrapper {
            background: #fcf3ea;
            padding: 6px;
            border-radius: 14px;
            box-shadow: inset 0 2px 12px rgba(180, 140, 120, 0.04), 0 4px 12px rgba(180, 140, 120, 0.04);
            margin-bottom: 10px;
            border: 2px solid #f0d5c8;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            aspect-ratio: 1 / 1;
            background: #fff8f0;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #f0d5c8;
            box-shadow: inset 0 0 0 1px #fcf3ea;
            width: 100%;
            height: 100%;
        }

        .cell {
            background: #fdf6f0;
            border: 1px solid #f0d5c8;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(18px, 6vw, 32px);
            font-family: 'Patrick Hand', 'Comic Sans MS', cursive;
            font-weight: 600;
            color: #8a6a5a;
            aspect-ratio: 1 / 1;
            transition: all 0.08s ease;
            cursor: pointer;
            min-width: 0;
            min-height: 0;
            touch-action: manipulation;
        }
        .cell:active {
            transform: scale(0.95);
        }

        .cell:nth-child(3n) { border-right: 2px solid #e8c8b8; }
        .cell:nth-child(9n) { border-right: none; }
        .cell:nth-child(n+19):nth-child(-n+27) { border-bottom: 2px solid #e8c8b8; }
        .cell:nth-child(n+46):nth-child(-n+54) { border-bottom: 2px solid #e8c8b8; }

        .cell.highlight-row { background: #fcf3ea; }
        .cell.highlight-col { background: #fcf3ea; }
        .cell.highlight-box { background: #f8ece4; }
        .cell.selected {
            background: #fce8dc !important;
            box-shadow: inset 0 0 0 3px #d49a8a, 0 0 16px rgba(200, 140, 120, 0.08);
            border-color: #d49a8a;
            transform: scale(0.96);
            z-index: 2;
        }
        .cell.given { color: #7a5a4a; font-weight: 700; }
        .cell.filled { color: #b08a7a; font-weight: 700; }
        .cell.error {
            background: #f5d0c8 !important;
            animation: shake 0.2s ease 2;
        }
        .cell.hint-flash {
            background: #e8e0d4 !important;
            animation: hint-pop 0.5s ease 2;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }
        @keyframes hint-pop {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .num-pad {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 5px;
            margin: 6px 0 6px;
        }
        .num-key {
            background: #fcf3ea;
            border: none;
            border-radius: 14px;
            padding: 10px 0;
            font-size: 22px;
            font-family: 'Patrick Hand', cursive;
            font-weight: bold;
            color: #b07a6a;
            box-shadow: 0 4px 0 #e0c8b8, 0 4px 12px rgba(180, 140, 120, 0.05);
            transition: all 0.05s linear;
            text-align: center;
            cursor: pointer;
            touch-action: manipulation;
            border: 2px solid #f0d5c8;
        }
        .num-key:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #e0c8b8, 0 4px 8px rgba(180, 140, 120, 0.03);
        }

        .tool-row {
            display: flex;
            gap: 5px;
            margin: 4px 0 8px;
        }
        .tool-btn {
            background: #fcf3ea;
            border: none;
            border-radius: 14px;
            padding: 8px 0;
            font-family: 'Patrick Hand', cursive;
            font-size: 16px;
            font-weight: bold;
            color: #b07a6a;
            box-shadow: 0 4px 0 #e0c8b8, 0 4px 12px rgba(180, 140, 120, 0.05);
            transition: all 0.05s linear;
            cursor: pointer;
            flex: 1;
            text-align: center;
            touch-action: manipulation;
            border: 2px solid #f0d5c8;
        }
        .tool-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #e0c8b8, 0 4px 8px rgba(180, 140, 120, 0.03);
        }
        .tool-btn.hint-btn {
            background: #f0e8dc;
            border-color: #e0d0c0;
            color: #9a7a6a;
        }
        .tool-btn.back-btn {
            background: #f5ece4;
            border-color: #e0c8b8;
            color: #b08a7a;
            flex: 0.6;
        }

        .footer-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 6px;
            font-family: 'Patrick Hand', cursive;
            color: #b07a6a;
            gap: 6px;
        }
        .footer-row .level-nav-btn {
            background: #fcf3ea;
            border: none;
            border-radius: 14px;
            padding: 4px 14px;
            font-size: 16px;
            box-shadow: 0 4px 0 #e0c8b8, 0 4px 12px rgba(180, 140, 120, 0.05);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 3px;
            touch-action: manipulation;
            white-space: nowrap;
            color: #b07a6a;
            border: 2px solid #f0d5c8;
        }
        .footer-row .level-nav-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #e0c8b8, 0 4px 8px rgba(180, 140, 120, 0.03);
        }
        .footer-row .level-display {
            background: #fff8f0;
            padding: 4px 16px;
            border-radius: 30px;
            border: 1px solid #f0d5c8;
            color: #d4a898;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .celebration {
            text-align: center;
            font-size: 22px;
            background: #f0e8dc;
            border-radius: 16px;
            padding: 8px 12px;
            border: 3px solid #d4c0b0;
            margin-top: 4px;
            color: #8a6a5a;
            font-weight: bold;
            box-shadow: 0 4px 12px rgba(180, 140, 120, 0.05);
            animation: celebrate-pop 0.5s ease;
        }
        @keyframes celebrate-pop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* ===== 响应式 ===== */
        @media (max-width: 420px) {
            .game-container {
                padding: 14px 10px 18px;
                border-radius: 18px;
                box-shadow: 0 8px 24px rgba(180, 140, 120, 0.08), 0 0 0 3px #f0d5c8, 0 0 0 6px #fce8dc, 0 0 0 9px #e8c8b8;
            }
            .deco-paw { font-size: 14px; }
            .deco-paw.tl { top: 6px; left: 8px; }
            .deco-paw.tr { top: 6px; right: 8px; }
            .deco-paw.bl { bottom: 6px; left: 8px; }
            .deco-paw.br { bottom: 6px; right: 8px; }

            .menu-header .title-main {
                font-size: 32px;
                letter-spacing: 2px;
            }
            .menu-header .title-icon { font-size: 56px; }
            .menu-header .title-icon img { width: 56px; height: 56px; }
            .menu-header .title-sub {
                font-size: 15px;
                letter-spacing: 4px;
                padding: 4px 14px;
            }
            .menu-btn {
                font-size: 24px;
                padding: 16px 32px;
                min-width: 160px;
                letter-spacing: 2px;
                border-radius: 20px;
            }
            .menu-btn::before,
            .menu-btn::after {
                font-size: 16px;
            }

<body>

    <div class="game-container" id="app">

        <span class="deco-paw tr">🐾</span>
        <span class="deco-paw bl">🐾</span>

        <!-- ===== 页面0：主菜单（像素小猫已更换） ===== -->

            <div class="menu-header">

                </div>

    <script>
        (function() {
            'use strict';

            // ============================================================
            // 1. 基础完整数独解
            // ============================================================
            const BASE_SOLUTION = [
                [5, 3, 4, 6, 7, 8, 9, 1, 2],
                [6, 7, 2, 1, 9, 5, 3, 4, 8],
                [1, 9, 8, 3, 4, 2, 5, 6, 7],
                [8, 5, 9, 7, 6, 1, 4, 2, 3],
                [4, 2, 6, 8, 5, 3, 7, 9, 1],
                [7, 1, 3, 9, 2, 4, 8, 5, 6],
                [9, 6, 1, 5, 3, 7, 2, 8, 4],
                [2, 8, 7, 4, 1, 9, 6, 3, 5],
                [3, 4, 5, 2, 8, 6, 1, 7, 9]
            ];

            // ============================================================
            // 2. 关卡生成器
            // ============================================================
            const TOTAL_LEVELS = 250;
            const LEVEL_DATA = [];

            function getLevelConfig(level) {
                let blanks, label;
                if (level <= 60) {
                    blanks = 20 + Math.floor(((level - 1) / 60) * 8);
                    label = '🌱 简单';
                } else if (level <= 140) {
                    blanks = 29 + Math.floor(((level - 61) / 80) * 10);
                    label = '🌿 中等';
                } else if (level <= 210) {
                    blanks = 39 + Math.floor(((level - 141) / 70) * 8);
                    label = '🌳 较难';
                } else {
                    blanks = 47 + Math.floor(((level - 211) / 40) * 6);
                    if (blanks > 52) blanks = 52;
                    label = '🔥 困难';
                }
                return { blanks, label };
            }

            function seededShuffle(array, seed) {
                const arr = [...array];
                let m = arr.length;
                let s = seed;
                while (m) {
                    m--;
                    s = (s * 9301 + 49297) % 233280;
                    const i = Math.floor((s / 233280) * (m + 1));
                    [arr[m], arr[i]] = [arr[i], arr[m]];
                }
                return arr;
            }

            function generatePuzzle(level) {
                const config = getLevelConfig(level);
                const targetBlanks = config.blanks;
                const solution = BASE_SOLUTION.map(row => [...row]);
                const puzzle = BASE_SOLUTION.map(row => [...row]);

                const seed = level * 7919 + 12345;
                const positions = [];
                for (let i = 0; i < 81; i++) positions.push(i);

                const shuffled = seededShuffle(positions, seed);
                const blankPositions = shuffled.slice(0, targetBlanks);

                for (const pos of blankPositions) {
                    const r = Math.floor(pos / 9);
                    const c = pos % 9;
                    puzzle[r][c] = 0;
                }

                return {
                    puzzle: puzzle,
                    solution: solution,
                    blanks: targetBlanks,
                    difficulty: config.label,
                    level: level
                };
            }

            for (let i = 1; i <= TOTAL_LEVELS; i++) {
                LEVEL_DATA.push(generatePuzzle(i));
            }

            // ============================================================
            // 3. 存档系统
            // ============================================================
            const STORAGE_KEY = 'sudoku_stardew_save';

            function getDefaultSave() {
                return {
                    currentLevel: 1,
                    unlockedLevel: 1,
                    completedLevels: [],
                    inProgress: {},
                    playerX: 0,
                    playerY: 0
                };
            }

            function loadSave() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if (raw) {
                        const data = JSON.parse(raw);
                        if (!data.completedLevels) data.completedLevels = [];
                        if (!data.inProgress) data.inProgress = {};
                        if (!data.unlockedLevel) data.unlockedLevel = data.currentLevel || 1;
                        return data;
                    }
                } catch (e) {}
                return getDefaultSave();
            }

            function saveGame() {
                try {
                    const data = {
                        currentLevel: currentLevel,
                        unlockedLevel: unlockedLevel,
                        completedLevels: Array.from(completedLevels),
                        inProgress: {},
                        playerX: playerX,
                        playerY: playerY
                    };
                    if (!isGameComplete && currentLevelData) {
                        data.inProgress[currentLevel] = {
                            filled: filledCount,
                            errors: errorCount,
                            time: timerSeconds,
                            board: board.map(row => [...row])
                        };
                    }
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                } catch (e) {}
            }

            // ============================================================
            // 4. 游戏状态
            // ============================================================
            let currentLevel = 1;
            let unlockedLevel = 1;
            let completedLevels = new Set();
            let playerX = 0, playerY = 0;

            let board = [];
            let solution = [];
            let given = [];
            let selectedRow = -1, selectedCol = -1;
            let filledCount = 0;
            let totalBlanks = 0;
            let errorCount = 0;
            let isGameComplete = false;
            let timerSeconds = 0;
            let timerInterval = null;
            let filledCells = new Set();
            let currentLevelData = null;

            // ============================================================
            // 5. DOM 引用
            // ============================================================
            const menuPage = document.getElementById('menuPage');
            const mapPage = document.getElementById('mapPage');
            const gamePage = document.getElementById('gamePage');
            const mapGrid = document.getElementById('mapGrid');
            const mapWrapper = document.getElementById('mapWrapper');
            const playerContainer = document.getElementById('playerContainer');
            const junimo = document.getElementById('junimo');
            const junimoBubble = document.getElementById('junimoBubble');
            const mapCompletedCount = document.getElementById('mapCompletedCount');
            const mapCurrentLevel = document.getElementById('mapCurrentLevel');

            const gridEl = document.getElementById('gridContainer');
            const progressDisplay = document.getElementById('progressDisplay');
            const errorDisplay = document.getElementById('errorCount');
            const timerDisplay = document.getElementById('timerDisplay');
            const levelBadge = document.getElementById('levelBadge');
            const difficultyTag = document.getElementById('difficultyTag');
            const levelNum = document.getElementById('levelNum');
            const totalLevelsEl = document.getElementById('totalLevels');

            const menuStartBtn = document.getElementById('menuStartBtn');

            // ============================================================
            // 6. 页面切换
            // ============================================================
            function showPage(pageId) {
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.getElementById(pageId).classList.add('active');
            }

            function goToMap() {
                if (timerInterval) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                }
                saveGame();
                showPage('mapPage');
                renderMap();
                junimo.classList.add('jump');
                setTimeout(() => {
                    junimo.classList.remove('jump');
                }, 600);
            }

            function goToMenu() {
                if (timerInterval) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                }
                saveGame();
                showPage('menuPage');
            }

            // ============================================================
            // 7. 关卡地图
            // ============================================================
            function renderMap() {
                mapGrid.innerHTML = '';
                const cols = 10;

                const shapes = ['🌸', '🌱', '🐾', '⭐', '🌿', '🌻', '🍀', '🌷', '💮', '🌺'];

                for (let i = 1; i <= TOTAL_LEVELS; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'map-cell';
                    cell.dataset.level = i;

                    const isCompleted = completedLevels.has(i);
                    const isUnlocked = i <= unlockedLevel;
                    const isCurrent = i === currentLevel;
                    const isInProgress = !isCompleted && isUnlocked && saveData.inProgress && saveData.inProgress[i];

                    const shapeIndex = (i - 1) % shapes.length;
                    const shape = shapes[shapeIndex];

                    if (!isUnlocked) {
                        cell.classList.add('locked');
                        cell.innerHTML = `<span class="level-icon">🔒</span><span class="level-num">${i}</span>`;
                    } else if (isCompleted) {
                        cell.classList.add('completed');
                        cell.innerHTML = `<span class="level-icon">🌟</span><span class="level-num">${i}</span>`;
                    } else if (isCurrent) {
                        cell.classList.add('current');
                        cell.innerHTML = `<span class="level-icon">📍</span><span class="level-num">${i}</span>`;
                    } else if (isInProgress) {
                        cell.classList.add('in-progress');
                        cell.innerHTML = `<span class="level-icon">🌿</span><span class="level-num">${i}</span>`;
                    } else {
                        cell.innerHTML = `<span class="level-icon">${shape}</span><span class="level-num">${i}</span>`;
                    }

                    cell.addEventListener('click', function(e) {
                        e.preventDefault();
                        const level = parseInt(this.dataset.level);
                        if (level <= unlockedLevel) {
                            goToLevel(level);
                        } else {
                            showBubble('🔒 先完成前面的关卡哦！', 1500);
                        }
                    });
                    cell.addEventListener('touchstart', function(e) {
                        e.preventDefault();
                        const level = parseInt(this.dataset.level);
                        if (level <= unlockedLevel) {
                            goToLevel(level);
                        } else {
                            showBubble('🔒 先完成前面的关卡哦！', 1500);
                        }
                    }, { passive: false });

                    mapGrid.appendChild(cell);
                }

                mapCompletedCount.textContent = completedLevels.size;
                mapCurrentLevel.textContent = currentLevel;
                updatePlayerPosition();
            }

            function updatePlayerPosition() {
                const cols = 10;
                const level = currentLevel;
                const idx = level - 1;
                const row = Math.floor(idx / cols);
                const col = idx % cols;

                playerX = col;
                playerY = row;

                const cells = mapGrid.querySelectorAll('.map-cell');
                if (cells.length > 0 && cells[idx]) {
                    const targetCell = cells[idx];
                    const containerRect = document.querySelector('.game-container').getBoundingClientRect();
                    const cellRect = targetCell.getBoundingClientRect();

                    const left = cellRect.left - containerRect.left + cellRect.width / 2 - 24;
                    const top = cellRect.top - containerRect.top - 32;

                    playerContainer.style.left = left + 'px';
                    playerContainer.style.top = top + 'px';
                    playerContainer.classList.remove('hidden');

                    if (completedLevels.has(level)) {
                        junimoBubble.textContent = '🌟 已完成！';
                    } else if (level === currentLevel && !isGameComplete) {
                        junimoBubble.textContent = '🌱 继续挑战！';
                    } else {
                        junimoBubble.textContent = `第${level}关`;
                    }
                    junimoBubble.classList.add('show');

                    const wrapper = document.getElementById('mapWrapper');
                    const scrollTarget = targetCell.offsetTop - wrapper.offsetHeight / 2 + 20;
                    wrapper.scrollTop = Math.max(0, scrollTarget);
                }
            }

            let bubbleTimeout = null;

            function showBubble(text, duration) {
                junimoBubble.textContent = text;
                junimoBubble.classList.add('show');
                if (bubbleTimeout) clearTimeout(bubbleTimeout);
                bubbleTimeout = setTimeout(() => {
                    junimoBubble.classList.remove('show');
                }, duration || 1500);
            }

            // ============================================================
            // 8. 游戏核心
            // ============================================================
            function goToLevel(level) {
                if (level < 1 || level > TOTAL_LEVELS) return;
                currentLevel = level;
                currentLevelData = LEVEL_DATA[level - 1];

                const save = loadSave();
                if (save.inProgress && save.inProgress[level]) {
                    const progress = save.inProgress[level];
                    const data = LEVEL_DATA[level - 1];
                    board = progress.board || data.puzzle.map(row => [...row]);
                    solution = data.solution.map(row => [...row]);
                    given = data.puzzle.map(row => [...row]);
                    filledCount = progress.filled || 0;
                    errorCount = progress.errors || 0;
                    timerSeconds = progress.time || 0;
                    isGameComplete = false;
                    filledCells = new Set();
                    for (let r = 0; r < 9; r++) {
                        for (let c = 0; c < 9; c++) {
                            if (board[r][c] !== 0 && given[r][c] === 0) {
                                filledCells.add(`${r},${c}`);
                            }
                        }
                    }
                    if (filledCount === totalBlanks) {
                        isGameComplete = true;
                        completedLevels.add(level);
                        save.completedLevels = Array.from(completedLevels);
                        localStorage.setItem(STORAGE_KEY, JSON.stringify(save));
                    }
                } else {
                    const data = LEVEL_DATA[level - 1];
                    board = data.puzzle.map(row => [...row]);
                    solution = data.solution.map(row => [...row]);
                    given = data.puzzle.map(row => [...row]);
                    filledCount = 0;
                    errorCount = 0;
                    timerSeconds = 0;
                    isGameComplete = false;
                    filledCells = new Set();
                }

                totalBlanks = 0;
                for (let r = 0; r < 9; r++) {
                    for (let c = 0; c < 9; c++) {
                        if (board[r][c] === 0) totalBlanks++;
                    }
                }

                showPage('gamePage');
                renderGame();
                startTimer();
                saveGame();
            }

            function renderGame() {
                gridEl.innerHTML = '';
                for (let r = 0; r < 9; r++) {
                    for (let c = 0; c < 9; c++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        const val = board[r][c];
                        if (val !== 0) {
                            cell.textContent = val;
                            if (given[r][c] !== 0) {
                                cell.classList.add('given');
                            } else {
                                cell.classList.add('filled');
                            }
                        }
                        if (selectedRow === r && selectedCol === c) {
                            cell.classList.add('selected');
                        }
                        cell.addEventListener('click', (function(row, col) {
                            return function(e) {
                                e.preventDefault();
                                if (isGameComplete) return;
                                selectedRow = row;
                                selectedCol = col;
                                highlightRelated(row, col);
                            };
                        })(r, c));
                        cell.addEventListener('touchstart', (function(row, col) {
                            return function(e) {
                                e.preventDefault();
                                if (isGameComplete) return;
                                selectedRow = row;
                                selectedCol = col;
                                highlightRelated(row, col);
                            };
                        })(r, c), { passive: false });
                        gridEl.appendChild(cell);
                    }
                }
                if (selectedRow >= 0 && selectedCol >= 0) {
                    highlightRelated(selectedRow, selectedCol);
                }

                levelBadge.textContent = `🐱 第${currentLevel}关`;
                const data = LEVEL_DATA[currentLevel - 1];
                difficultyTag.textContent = data.difficulty || '🌱 简单';
                levelNum.textContent = currentLevel;
                totalLevelsEl.textContent = TOTAL_LEVELS;
                updateProgress();
                updateErrors();

                if (isGameComplete) {
                    showCelebration();
                }
            }

            function highlightRelated(row, col) {
                const cells = document.querySelectorAll('.cell');
                cells.forEach(cell => {
                    cell.classList.remove('highlight-row', 'highlight-col', 'highlight-box', 'selected');
                });
                for (let c = 0; c < 9; c++) {
                    const idx = row * 9 + c;
                    if (idx < cells.length) cells[idx].classList.add('highlight-row');
                }
                for (let r = 0; r < 9; r++) {
                    const idx = r * 9 + col;
                    if (idx < cells.length) cells[idx].classList.add('highlight-col');
                }
                const boxRow = Math.floor(row / 3) * 3;
                const boxCol = Math.floor(col / 3) * 3;
                for (let r = boxRow; r < boxRow + 3; r++) {
                    for (let c = boxCol; c < boxCol + 3; c++) {
                        const idx = r * 9 + c;
                        if (idx < cells.length) cells[idx].classList.add('highlight-box');
                    }
                }
                const idx = row * 9 + col;
                if (idx < cells.length) cells[idx].classList.add('selected');
            }

            function tryFillNumber(num) {
                if (isGameComplete) return false;
                if (selectedRow === -1 || selectedCol === -1) return false;
                const row = selectedRow, col = selectedCol;
                if (given[row][col] !== 0) return false;

                const correct = solution[row][col];
                if (num === correct) {
                    board[row][col] = num;
                    filledCells.add(`${row},${col}`);
                    filledCount++;
                    renderGame();
                    highlightRelated(row, col);
                    saveGame();
                    if (filledCount === totalBlanks) {
                        completeLevel();
                    }
                    return true;
                } else {
                    errorCount++;
                    updateErrors();
                    const cells = document.querySelectorAll('.cell');
                    const idx = row * 9 + col;
                    if (idx < cells.length) {
                        cells[idx].classList.add('error');
                        setTimeout(() => {
                            cells[idx].classList.remove('error');
                        }, 400);
                    }
                    saveGame();
                    return false;
                }
            }

            function completeLevel() {
                isGameComplete = true;
                completedLevels.add(currentLevel);

                if (currentLevel + 1 <= TOTAL_LEVELS) {
                    if (currentLevel + 1 > unlockedLevel) {
                        unlockedLevel = currentLevel + 1;
                    }
                }

                const save = loadSave();
                if (save.inProgress) {
                    delete save.inProgress[currentLevel];
                }
                save.completedLevels = Array.from(completedLevels);
                save.unlockedLevel = unlockedLevel;
                localStorage.setItem(STORAGE_KEY, JSON.stringify(save));

                showCelebration();
                renderMap();
                saveGame();

                junimo.classList.add('celebrate');
                setTimeout(() => {
                    junimo.classList.remove('celebrate');
                }, 2100);
            }

            function showCelebration() {
                const container = document.querySelector('.game-container');
                const existing = container.querySelector('.celebration');
                if (existing) existing.remove();

                const celeb = document.createElement('div');
                celeb.className = 'celebration';
                const m = String(Math.floor(timerSeconds / 60)).padStart(2, '0');
                const s = String(timerSeconds % 60).padStart(2, '0');
                celeb.innerHTML = `🎊 通关！ 🎊<br>⭐ 用时 ${m}:${s}，错误 ${errorCount} 次 ⭐`;
                container.insertBefore(celeb, document.querySelector('.num-pad'));
                setTimeout(() => {
                    if (celeb.parentNode) celeb.remove();
                }, 6000);
            }

            function eraseNumber() {
                if (isGameComplete) return;
                if (selectedRow === -1 || selectedCol === -1) return;
                const row = selectedRow, col = selectedCol;
                if (given[row][col] !== 0) return;
                if (board[row][col] !== 0) {
                    const key = `${row},${col}`;
                    if (filledCells.has(key)) {
                        filledCells.delete(key);
                        filledCount--;
                    }
                    board[row][col] = 0;
                    renderGame();
                    highlightRelated(row, col);
                    updateProgress();
                    saveGame();
                }
            }

            function giveHint() {
                if (isGameComplete) return;
                for (let r = 0; r < 9; r++) {
                    for (let c = 0; c < 9; c++) {
                        if (board[r][c] === 0) {
                            const correct = solution[r][c];
                            board[r][c] = correct;
                            filledCells.add(`${r},${c}`);
                            filledCount++;
                            const cells = document.querySelectorAll('.cell');
                            const idx = r * 9 + c;
                            if (idx < cells.length) {
                                cells[idx].classList.add('hint-flash');
                                setTimeout(() => {
                                    cells[idx].classList.remove('hint-flash');
                                }, 1000);
                            }
                            renderGame();
                            highlightRelated(r, c);
                            updateProgress();
                            saveGame();
                            if (filledCount === totalBlanks) {
                                completeLevel();
                            }
                            return;
                        }
                    }
                }
            }

            function startTimer() {
                if (timerInterval) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                }
                timerInterval = setInterval(() => {
                    timerSeconds++;
                    const m = String(Math.floor(timerSeconds / 60)).padStart(2, '0');
                    const s = String(timerSeconds % 60).padStart(2, '0');
                    timerDisplay.textContent = `${m}:${s}`;
                    if (timerSeconds % 10 === 0) {
                        saveGame();
                    }
                }, 1000);
            }

            function updateProgress() {
                progressDisplay.textContent = `${filledCount}/${totalBlanks}`;
            }

            function updateErrors() {
                errorDisplay.textContent = errorCount;
            }

            function resetLevel() {
                const data = LEVEL_DATA[currentLevel - 1];
                board = data.puzzle.map(row => [...row]);
                solution = data.solution.map(row => [...row]);
                given = data.puzzle.map(row => [...row]);
                selectedRow = -1;
                selectedCol = -1;
                filledCount = 0;
                errorCount = 0;
                isGameComplete = false;
                filledCells = new Set();

                totalBlanks = 0;
                for (let r = 0; r < 9; r++) {
                    for (let c = 0; c < 9; c++) {
                        if (board[r][c] === 0) totalBlanks++;
                    }
                }

                timerSeconds = 0;
                timerDisplay.textContent = '00:00';

                const save = loadSave();
                if (save.inProgress) {
                    delete save.inProgress[currentLevel];
                }
                localStorage.setItem(STORAGE_KEY, JSON.stringify(save));

                renderGame();
                updateProgress();
                updateErrors();
                saveGame();

                document.querySelectorAll('.celebration').forEach(el => el.remove());
            }

            function prevLevel() {
                if (currentLevel > 1) {
                    goToLevel(currentLevel - 1);
                }
            }

            function nextLevel() {
                if (currentLevel < TOTAL_LEVELS) {
                    goToLevel(currentLevel + 1);
                }
            }

            // ============================================================
            // 9. 主菜单功能
            // ============================================================
            function startGame() {
                const save = loadSave();
                currentLevel = save.currentLevel || 1;
                unlockedLevel = save.unlockedLevel || 1;
                completedLevels = new Set(save.completedLevels || []);

                if (completedLevels.has(currentLevel) && currentLevel < TOTAL_LEVELS) {
                    currentLevel++;
                }

                goToMap();
            }

            function resetAllProgress() {
                if (confirm('⚠️ 确定要重置所有进度吗？\n所有关卡数据将被清除！')) {
                    localStorage.removeItem(STORAGE_KEY);
                    currentLevel = 1;
                    unlockedLevel = 1;
                    completedLevels = new Set();
                    saveData = getDefaultSave();
                    goToMap();
                }
            }

            // ============================================================
            // 10. 事件绑定
            // ============================================================
            menuStartBtn.addEventListener('click', function(e) {
                e.preventDefault();
                startGame();
            });
            menuStartBtn.addEventListener('touchstart', function(e) {
                e.preventDefault();
                startGame();
            }, { passive: false });

            document.querySelectorAll('.num-key').forEach(key => {
                key.addEventListener('click', function(e) {
                    e.preventDefault();
                    tryFillNumber(parseInt(this.dataset.num, 10));
                });
                key.addEventListener('touchstart', function(e) {
                    e.preventDefault();
                    tryFillNumber(parseInt(this.dataset.num, 10));
                }, { passive: false });
            });

            document.getElementById('clearBtn').addEventListener('click', function(e) {
                e.preventDefault();
                eraseNumber();
            });
            document.getElementById('clearBtn').addEventListener('touchstart', function(e) {
                e.preventDefault();
                eraseNumber();
            }, { passive: false });

            document.getElementById('hintBtn').addEventListener('click', function(e) {
                e.preventDefault();
                giveHint();
            });
            document.getElementById('hintBtn').addEventListener('touchstart', function(e) {
                e.preventDefault();
                giveHint();
            }, { passive: false });

            document.getElementById('resetBtn').addEventListener('click', function(e) {
                e.preventDefault();
                resetLevel();
            });
            document.getElementById('resetBtn').addEventListener('touchstart', function(e) {
                e.preventDefault();
                resetLevel();
            }, { passive: false });

            document.getElementById('backToMapBtn').addEventListener('click', function(e) {
                e.preventDefault();
                goToMap();
            });
            document.getElementById('backToMapBtn').addEventListener('touchstart', function(e) {
                e.preventDefault();
                goToMap();
            }, { passive: false });

            document.getElementById('prevLevelBtn').addEventListener('click', function(e) {
                e.preventDefault();
                prevLevel();
            });
            document.getElementById('prevLevelBtn').addEventListener('touchstart', function(e) {
                e.preventDefault();
                prevLevel();
            }, { passive: false });

            document.getElementById('nextLevelBtn').addEventListener('click', function(e) {
                e.preventDefault();
                nextLevel();
            });
            document.getElementById('nextLevelBtn').addEventListener('touchstart', function(e) {
                e.preventDefault();
                nextLevel();
            }, { passive: false });

            // 键盘支持
            document.addEventListener('keydown', function(e) {
                if (!gamePage.classList.contains('active')) return;
                if (e.key >= '1' && e.key <= '9') {
                    tryFillNumber(parseInt(e.key));
                }
                if (e.key === 'Backspace' || e.key === 'Delete') {
                    eraseNumber();
                }
                if (e.key === 'h' || e.key === 'H') {
                    giveHint();
                }
                if (e.key === 'r' || e.key === 'R') {
                    resetLevel();
                }
                if (e.key === 'ArrowLeft') {
                    prevLevel();
                }
                if (e.key === 'ArrowRight') {
                    nextLevel();
                }
                if (e.key === 'Escape' || e.key === 'm' || e.key === 'M') {
                    goToMap();
                }
            });

            document.addEventListener('touchmove', function(e) {
                if (e.target.closest('.game-container')) {
                    if (e.target.closest('.map-grid-wrapper')) return;
                    e.preventDefault();
                }
            }, { passive: false });

            let resizeTimeout;
            window.addEventListener('resize', function() {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(() => {
                    if (mapPage.classList.contains('active')) {
                        updatePlayerPosition();
                    }
                }, 200);
            });

            // ============================================================
            // 11. 初始化
            // ============================================================
            let saveData = loadSave();
            showPage('menuPage');

            console.log('🐱 喵露谷数独已加载！');
            console.log(`📊 当前进度: 第${saveData.currentLevel}关, 已完成 ${saveData.completedLevels.length}/250`);
            console.log('🧚 祝尼魔已就位！');
        })();
    </script>

</body>
</html>
